name: release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: manual-release
  cancel-in-progress: false

jobs:
  version:
    name: compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}
      tag: ${{ steps.next.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Compute next odometer SemVer
        id: next
        shell: bash
        run: |
          current="$(cargo pkgid | sed 's/.*[#@]//')"
          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
          latest="${latest_tag#v}"

          base="$current"
          if [ -n "$latest" ]; then
            IFS=. read -r current_major current_minor current_patch <<< "$current"
            IFS=. read -r latest_major latest_minor latest_patch <<< "$latest"

            if [ "$latest_major" -gt "$current_major" ] || \
               { [ "$latest_major" -eq "$current_major" ] && [ "$latest_minor" -gt "$current_minor" ]; } || \
               { [ "$latest_major" -eq "$current_major" ] && [ "$latest_minor" -eq "$current_minor" ] && [ "$latest_patch" -gt "$current_patch" ]; }; then
              base="$latest"
            fi
          fi

          IFS=. read -r major minor patch <<< "$base"
          patch=$((patch + 1))
          if [ "$patch" -gt 9 ]; then
            patch=0
            minor=$((minor + 1))
          fi

          if [ "$minor" -gt 9 ]; then
            minor=0
            major=$((major + 1))
          fi

          next="$major.$minor.$patch"

          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"
          echo "Next release: v$next"

  build:
    name: build ${{ matrix.name }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: lum-linux-x86_64
            bin: target/x86_64-unknown-linux-gnu/release/lum
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            asset: lum-macos-aarch64
            bin: target/aarch64-apple-darwin/release/lum
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: lum-windows-x86_64.exe
            bin: target/x86_64-pc-windows-msvc/release/lum.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux audio dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpulse-dev pkg-config

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Set package version
        run: cargo set-version --package lum ${{ needs.version.outputs.version }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: publish release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh release create "$TAG" dist/* \
            --title "lum v$VERSION" \
            --notes "Automated release from $GITHUB_SHA" \
            --target "$GITHUB_SHA"

      - name: Commit version bump
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          cargo set-version --package lum "$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock xtask/Cargo.toml
          git commit -m "chore: bump version to v$VERSION"
          git push